services:
  mcpanel:
    build: .
    # Or use a pre-built image if you push to a registry:
    # image: your-registry/mcpanel:latest
    container_name: mcpanel
    restart: unless-stopped
    ports:
      - "3001:3000"          # Remove this if you're using Nginx Proxy Manager
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      PORT: 3000
      JWT_SECRET: "${JWT_SECRET}"
      PANEL_USERNAME: "${PANEL_USERNAME:-admin}"
      PANEL_PASSWORD_HASH: "${PANEL_PASSWORD_HASH}"

# ── Nginx Proxy Manager integration ─────────────────────────────────────────
# If you use NPM, uncomment the lines below and remove the "ports" mapping above.
# Make sure the "proxy" network already exists: docker network create proxy
#
#    networks:
#      - proxy
#
# networks:
#   proxy:
#     external: true
